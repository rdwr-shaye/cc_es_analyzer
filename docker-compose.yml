# CC Elasticsearch Analyzer — standalone stack.
# Deliberately isolated so it can run next to other containers without touching
# them: its own project name, container name, network and host port.
name: cc-es-analyzer

services:
  cc_es_analyzer:
    build: .
    image: cc_es_analyzer:latest
    # Rebuild from source on every `docker compose up -d` (no need for --build),
    # so re-running it after a `git pull` always picks up the latest code.
    pull_policy: build
    container_name: cc_es_analyzer
    restart: unless-stopped
    # Host port is configurable; defaults to 8801 to avoid common conflicts.
    ports:
      - "${HOST_PORT:-8801}:8000"
    environment:
      # ES connection is entered in the UI at runtime; these are only defaults.
      SERVICE_HOST: "0.0.0.0"
      SERVICE_PORT: "8000"
      # Serve HTTPS (set SERVICE_SSL=true) for hosts that block plain HTTP. With
      # no cert supplied a self-signed one is generated on first start (browsers
      # warn — expected). Then browse https://<host>:<port>/.
      SERVICE_SSL: "${SERVICE_SSL:-false}"
      # Server-side index archives (<index>.csv.gz) — kept on a volume so they
      # survive container rebuilds.
      EXPORTS_DIR: "/app/exports"
    volumes:
      - cc_es_analyzer_logs:/app/logs
      - cc_es_analyzer_exports:/app/exports
      # Remembered SSH credentials (encrypted) for snapshot archives.
      - cc_es_analyzer_data:/app/data
    networks:
      - cc_es_analyzer_net

networks:
  cc_es_analyzer_net:
    name: cc_es_analyzer_net

volumes:
  cc_es_analyzer_logs:
    name: cc_es_analyzer_logs
  cc_es_analyzer_exports:
    name: cc_es_analyzer_exports
  cc_es_analyzer_data:
    name: cc_es_analyzer_data

