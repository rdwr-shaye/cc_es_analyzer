# CC Elasticsearch Analyzer — path-based location block.
#
# Unlike deploy/nginx/cc-analyzer.conf (an isolated name-based vhost that never
# touches the docs proxy's own server blocks), this snippet is INSERTED into the
# docs-platform's existing `server_name _;` block(s) by deploy/setup_nginx_path.py,
# so the app becomes reachable at /cc_es_analyzer/ on the same IP/hostname the
# docs site already uses. This is more invasive than the name-based vhost: it
# edits the shared docs template rather than adding a fully separate file.
#
# The frontend (frontend/static/js/app.js, APP_BASE) already derives its base
# path from window.location, so it works correctly whether served at "/",
# "/cc_es_analyzer/", or a name-based vhost — no app changes needed here.

    location = /cc_es_analyzer { return 301 $scheme://$http_host/cc_es_analyzer/; }

    location /cc_es_analyzer/ {
        client_max_body_size 50m;          # allow large query bodies / bulk ops
        rewrite ^/cc_es_analyzer/?(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8801;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;                # stream exports without buffering
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
