# CC Elasticsearch Analyzer — name-based nginx vhost.
#
# Added alongside the docs-platform reverse proxy WITHOUT touching its config.
# The docs proxy routes by PATH on `server_name _` (default_server) and already
# owns "/", "/api/", "/mcp/", "/v1/", "/images/". Our app also needs "/" and
# "/api/", so it CANNOT share that path space — instead it gets its own
# server_name. Requests whose Host is NOT one of ours keep hitting the docs
# default_server, so the docs platform is unaffected.
#
# Reach it by pointing a hostname at the VM, e.g. add to your hosts file:
#   10.27.20.24  cc-analyzer  cc-analyzer.local
# then open  http://cc-analyzer/

server {
    listen 80;
    server_name cc-analyzer cc-analyzer.local;

    client_max_body_size 50m;          # allow large query bodies / bulk ops

    location / {
        proxy_pass http://127.0.0.1:8801;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;            # stream exports without buffering
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

server {
    listen 443 ssl;
    server_name cc-analyzer cc-analyzer.local;

    # Reuse the reverse proxy's existing self-signed cert (browser will warn;
    # HTTP on port 80 works without warnings).
    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8801;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

